services:
  rag-agent:
    image: oci-rag-agent-blueprint-agent
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ${HOME}/.oci:${HOME}/.oci:ro
      - ${HOME}/.oci:/root/.oci:ro
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  rag-ui:
    image: oci-rag-agent-blueprint-ui
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      rag-agent:
        condition: service_healthy
