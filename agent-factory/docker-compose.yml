version: "2.4"

services:
  factory-api:
    image: oci-rag-agent-factory-api
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      OCI_CONFIG_FILE: /root/.oci/config
      OCI_PROFILE: ${OCI_PROFILE}
      OCI_AUTH_MODE: ${OCI_AUTH_MODE}
    volumes:
      - ${HOME}/.oci:/root/.oci:ro
      - ${HOME}/.oci:${HOME}/.oci:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8081"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8081/factory/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  factory-ui:
    image: oci-rag-agent-factory-ui
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_FACTORY_API_URL: http://localhost:8081/factory/deployments
    environment:
      NEXT_PUBLIC_FACTORY_API_URL: http://localhost:8081/factory/deployments
    ports:
      - "3100:3100"
    depends_on:
      factory-api:
        condition: service_healthy
